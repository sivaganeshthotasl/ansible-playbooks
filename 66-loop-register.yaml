# Loop + Register
# Suppose you want to check whether mutiple files are created or not we can check the status 

- name: Check Multiple files
  hosts: local
  connection: local
  become: true

  tasks:
  - name: Check files
    ansible.builtin.file:
      path: "{{ item }}"
      state: touch
    loop:
      - /opt/ansible1.txt
      - /opt/ansible2.txt
      - /opt/ansible3.txt
    register: FILE_STATUS

  - name: Display output
    ansible.builtin.debug:
      msg: "{{ FILE_STATUS.results }}"