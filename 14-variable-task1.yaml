---

- name: Task level Variable example
  hosts: local
  connection: local

  vars:
    NAME: SIVAJI


  tasks:
  - name: Create Variable
    vars:
      NAME: SIVA Ganesh Thota
    ansible.builtin.debug:
      msg: "My Name is {{ NAME }}"

  - name: Display the Glb Variable
    ansible.builtin.debug:
      msg: "My name is {{ NAME }}"


