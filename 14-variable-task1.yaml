---
# Variable Practice Task 1
# Create a Variable

- name: Variable Creation
  hosts: local
  connection: local

  vars:
    CITY: HYD

  tasks:
  - name: task level var
    vars:
      CITY: Bangalore
  - name: Display the CITY
    ansible.builtin.debug:
      msg: "I live in {{ CITY }}"
      

  

  

