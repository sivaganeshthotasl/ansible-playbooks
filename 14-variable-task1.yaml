- name: installing nginx package
  hosts: local
  connection: local
  become: true # runs 

  vars:
    PACKAGE: nginx

  tasks: 
  - name: Displaying  Nginx PACKAGE
    ansible.builtin.debug:
      msg: "Going to install {{ PACKAGE }}"
  
  - name: Installing Nginx
    ansible.builtin.package:
      name: {{ PACKAGE }}
      state: present # present = install
  - name: Displaying Installation Success
    ansible.builtin.debug:
      msg: "{{ PACKAGE }} IS Installed Successfully"




