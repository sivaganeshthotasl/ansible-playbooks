---
# Store your name in a variable and print it.

- name: single Variable Demo
  hosts: local
  connection: local

  vars:
    NAME: Siva Ganesh Thota SL

  tasks:
  - name: Print Name Variable
    ansible.builtin.debug:
      msg: "{{ NAME }}"  # start with double quotes   # to Access Variable value we should use {{ var name }} space is needed 
