# Create Multiple Conditions

- name: Multiple Conditions (and)
  hosts: local
  connection: local
  vars:
    ENV: APACHE
    APP: APACHE

  tasks:
  - name: Deploy Application
    ansible.builtin.debug:
      msg:  "Deploying {{ APP }} in {{ ENV }}"

    when: 
      - ENV == "Prod"
      - APP == "nginx"
