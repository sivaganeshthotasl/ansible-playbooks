# Ask the user for a name and print given input by user

- name: Prompt Variable Demo
  hosts: local
  connection: local


  vars_prompt:  ## vars_prompt stops the playbook to ask the user for data at runtime in shell script we used read -p "prompt" <varname>
    name: USER_NAME # # This variable name will store the user's answer
    prompt: Enter Your Name # This text appears on the user's screen as the question
    private: no  # Displays what the user types on screen. no means its not private so user input date will be visible if yes means then it's private user input shouldn't be visible

  tasks:
  - name: Display the user prompt
    ansible.builtin.debug: 
      msg: "Welocome to Ansible Practice Class {{ USER_NAME }}. We are happy to have you here"



